<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麦当劳助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931b 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .model-selector {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: inline-block;
        }
        
        .model-selector label {
            margin-right: 10px;
            font-weight: 500;
        }
        
        .model-selector select {
            padding: 5px 15px;
            border: none;
            border-radius: 5px;
            background: white;
            font-size: 1em;
            cursor: pointer;
        }
        
        .chat-container {
            padding: 30px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 85%;
            line-height: 1.6;
        }
        
        .message.user {
            background: linear-gradient(135deg, #ff6b35 0%, #f7931b 100%);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        
        .message.assistant {
            background: white;
            color: #333;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .message.system {
            background: #e9ecef;
            color: #6c757d;
            align-self: center;
            font-size: 0.9em;
            text-align: center;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
        }
        
        .input-area textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            resize: none;
            font-family: inherit;
            font-size: 1em;
            height: 60px;
            transition: border-color 0.3s;
        }
        
        .input-area textarea:focus {
            outline: none;
            border-color: #ff6b35;
        }
        
        .btn {
            padding: 0 25px;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931b 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .status-bar {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c757d;
            font-size: 0.9em;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 10px 20px;
            color: #6c757d;
        }
        
        .typing-indicator.active {
            display: flex;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background: #6c757d;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .message-content {
            white-space: pre-wrap;
        }
        
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        
        .message-content th,
        .message-content td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        .message-content th {
            background: #f5f5f5;
        }
        
        .message-content ul {
            margin-left: 20px;
        }
        
        .message-content li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍔 麦当劳助手</h1>
            <p>智能点餐助手 - 您的私人麦当劳顾问</p>
            <div class="model-selector">
                <label for="modelSelect">选择模型：</label>
                <select id="modelSelect">
                    <option value="local">本地模型 (OpenAI兼容)</option>
                    <option value="minimax">MiniMax (Anthropic兼容)</option>
                </select>
            </div>
        </div>
        
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message system">
                    欢迎使用麦当劳助手！我可以帮您查询优惠券、商品列表、订单状态等。请告诉我您需要什么服务？
                </div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            
            <div class="input-area">
                <textarea id="userInput" placeholder="输入您的问题，例如：我有哪些优惠券？或查询商品列表..."></textarea>
                <button class="btn" id="sendBtn">发送</button>
            </div>
        </div>
        
        <div class="status-bar">
            <div class="status">
                <div class="status-dot"></div>
                <span id="statusText">服务运行中</span>
            </div>
            <div class="status">
                <span>当前模型：<span id="currentModel">本地模型</span></span>
            </div>
        </div>
    </div>
    
    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const modelSelect = document.getElementById('modelSelect');
        const currentModelSpan = document.getElementById('currentModel');
        
        let currentModel = 'local';
        
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function addMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }
        
        modelSelect.addEventListener('change', (e) => {
            currentModel = e.target.value;
            currentModelSpan.textContent = e.target.options[e.target.selectedIndex].text;
        });
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            userInput.value = '';
            
            sendBtn.disabled = true;
            typingIndicator.classList.add('active');
            
            try {
                const response = await fetch('http://localhost:5000/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        message: text,
                        model: currentModel
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addMessage(data.response, 'assistant');
                } else {
                    addMessage(`错误: ${data.error}`, 'system');
                }
            } catch (error) {
                addMessage(`连接服务器失败: ${error.message}。请确保后端服务正在运行。`, 'system');
            } finally {
                sendBtn.disabled = false;
                typingIndicator.classList.remove('active');
            }
        }
        
        sendBtn.addEventListener('click', sendMessage);
        
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                userInput.value += '\n';
            }
        });
    </script>
</body>
</html>
